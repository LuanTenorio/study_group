<main class="login-page">
  <section class="hero-banner">
    <div class="hero-content">
      <span class="hero-badge">Área do estudante</span>
      <h1>Bem-vindo de volta</h1>
      <p>Entre para encontrar seus grupos, acompanhar encontros e continuar estudando com a sua comunidade.</p>
    </div>
  </section>

  <section class="login-container">
    <div class="login-card">
      <header class="login-header">
        <span class="card-badge">
          <i class="pi pi-lock"></i>
          Acesso seguro
        </span>

        <h2 class="login-title">Entrar na conta</h2>

        <p class="login-subtitle">
          Use seu e-mail institucional ou pessoal para continuar.
        </p>
      </header>

      <form
        class="login-form"
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()">

        <div class="form-field">
          <label for="email">E-mail</label>

          <div class="input-group">
            <i class="pi pi-envelope"></i>
            <input
              id="email"
              type="email"
              pInputText
              formControlName="email"
              autocomplete="email"
              placeholder="seu.email@exemplo.com"
              fluid />
          </div>
        </div>

        <div class="form-field">
          <label for="password">Senha</label>

          <div class="input-group">
            <i class="pi pi-key"></i>
            <p-password
              inputId="password"
              formControlName="password"
              [feedback]="false"
              autocomplete="current-password"
              placeholder="Digite sua senha"
              fluid>
            </p-password>
          </div>
        </div>

        @if (requestError()) {
          <p-message severity="error" variant="simple">
            {{ requestError() }}
          </p-message>
        }

        <div class="form-actions">
          <p-button
            type="submit"
            label="Entrar">
          </p-button>
        </div>
      </form>
    </div>
  </section>
</main>
