<div class="form-container">
  <!-- Cabeçalho -->
  <header class="form-header">
    <div class="breadcrumb">
      <a routerLink="/" class="back-link">
        <i class="pi pi-arrow-left"></i> Voltar aos Grupos
      </a>
    </div>
    <h1 class="page-title">Criar Novo Grupo de Estudos</h1>
    <p class="page-subtitle">Dê um nome e selecione a área de conhecimento para começar.</p>
  </header>

  <!-- Cartão do Formulário -->
  <main class="form-card">
    <form [formGroup]="groupForm" (ngSubmit)="onSubmit()">
      
      <!-- Campo 1: Nome do Grupo -->
      <div class="field-group">
        <label for="name" class="field-label">Nome do Grupo <span class="required">*</span></label>
        <input 
          id="name" 
          type="text" 
          pInputText 
          formControlName="name" 
          placeholder="Ex: Grupo de Estudos em Algoritmos Avançados"
          [class.ng-invalid]="isFieldInvalid('name')" 
          [class.ng-dirty]="isFieldInvalid('name')" />
        
        @if (isFieldInvalid('name')) {
          <small class="error-message">
            <i class="pi pi-exclamation-circle"></i> 
            O nome do grupo é obrigatório (mínimo de 4 caracteres).
          </small>
        }
      </div>

      <!-- Campo 2: Área de Conhecimento -->
      <div class="field-group">
        <label for="area" class="field-label">Área de Conhecimento <span class="required">*</span></label>
        <p-select 
          id="area" 
          [options]="areas()" 
          formControlName="areaId" 
          placeholder="Selecione a área principal"
          optionLabel="label" 
          optionValue="value"
          appendTo="body"
          styleClass="w-full"
          [class.ng-invalid]="isFieldInvalid('areaId')">
        </p-select>
        
        @if (isFieldInvalid('area')) {
          <small class="error-message">
            <i class="pi pi-exclamation-circle"></i> Selecione uma área de conhecimento.
          </small>
        }
      </div>

      <!-- Ações do Formulário -->
      <div class="form-actions">
        <p-button 
          label="Cancelar" 
          severity="secondary" 
          [outlined]="true" 
          routerLink="/" 
          type="button">
        </p-button>
        
        <p-button 
          label="Criar Grupo" 
          icon="pi pi-check" 
          type="submit" 
          [loading]="isSubmitting()"
          [disabled]="groupForm.invalid && groupForm.touched">
        </p-button>
      </div>

    </form>
  </main>
</div>
